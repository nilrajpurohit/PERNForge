name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    env:
      DOCKER_USER: ${{ secrets.DOCKER_HUB_USERNAME }}

    strategy:
      matrix:
        include:
          - app: server
            image: pern-server
            dockerfile: apps/server/Dockerfile
          - app: client
            image: pern-client
            dockerfile: apps/client/Dockerfile

    concurrency:
      group: ci-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@9.8.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client (server only)
        run: pnpm --filter @pern-auth/server prisma:generate

      - name: Run tests
        run: pnpm test

      - name: Run build
        run: pnpm build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build & Push ${{ matrix.app }} image
        run: |
          docker buildx build \
            --progress=plain \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            -f ${{ matrix.dockerfile }} \
            -t ${{ secrets.DOCKER_HUB_USERNAME }}/${{ matrix.image }}:${{ github.sha }} \
            -t ${{ secrets.DOCKER_HUB_USERNAME }}/${{ matrix.image }}:latest \
            --push \
            .