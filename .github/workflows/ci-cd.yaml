name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - app: server
            image: pern-server
            dockerfile: apps/server/Dockerfile
            run_tests: true
            run_prisma: true

          - app: client
            image: pern-client
            dockerfile: apps/client/Dockerfile
            run_tests: false
            run_prisma: false

    env:
      DOCKER_USER: ${{ secrets.DOCKER_HUB_USERNAME }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@9.8.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # -----------------------------
      # SERVER ONLY STEP (FIX)
      # -----------------------------
      - name: Generate Prisma Client
        if: matrix.run_prisma == true
        run: pnpm --filter @pern-auth/server prisma:generate

      # -----------------------------
      # TESTS (SERVER ONLY)
      # -----------------------------
      - name: Run tests
        if: matrix.run_tests == true
        run: pnpm test

      - name: Run build
        run: pnpm build

      # -----------------------------
      # DOCKER
      # -----------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build & Push ${{ matrix.app }}
        run: |
          docker buildx build \
            --progress=plain \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            -f ${{ matrix.dockerfile }} \
            -t $DOCKER_USER/${{ matrix.image }}:${{ github.sha }} \
            -t $DOCKER_USER/${{ matrix.image }}:latest \
            --push \
            .