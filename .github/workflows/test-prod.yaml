name: Test Production Compose (Docker Hub Images)

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types:
      - completed
  workflow_dispatch:
jobs:
  test-prod-compose:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env for production test
        run: |
          cat <<EOF > .env
          APP_NAME=PERNForge
          NGINX_PORT=80
          CLIENT_URL=http://client:4173
          CLIENT_PORT=4173
          SERVER_URL=http://server:4000
          SERVER_PORT=4000
          API_BASE_URL=/api
          DB_URL=postgresql://test:test@postgres:5432/testdb
          DB_NAME=testdb
          DB_USER=test
          DB_PASSWORD=test
          DB_PORT=5432
          REDIS_URL=redis://redis:6379
          REDIS_HOST=redis
          REDIS_PORT=6379
          JWT_SECRET=testsecret
          DOCKERHUB_USERNAME=${{ secrets.DOCKER_HUB_USERNAME }}
          EOF

      - name: Set up Docker Compose
        run: docker compose version

      - name: Build images & start production stack
        run: |
          # Build local images from the repository Dockerfiles so CI tests the current code
          docker compose -f compose.prod.yaml build --pull
          docker compose -f compose.prod.yaml up -d --wait

      - name: Wait for services
        run: sleep 15

      - name: Check running containers
        run: docker ps
      
      - name: Show compose service status and ports
        run: |
          docker compose -f compose.prod.yaml ps
          docker compose -f compose.prod.yaml port server 4000 || true

      - name: Dump server logs (helpful for debugging startup)
        run: docker compose -f compose.prod.yaml logs --tail=200 server || true

      - name: In-network curl from client container
        run: |
          # Try reaching the server from the client service inside the compose network
          docker compose -f compose.prod.yaml exec -T client sh -c "curl -v --fail http://server:4000/api/health" || true

      - name: In-container curl on server
        run: |
          # Try curling localhost from inside the server container
          docker compose -f compose.prod.yaml exec -T server sh -c "curl -v --fail http://localhost:4000/api/health" || true

      - name: Show server container logs
        run: docker compose -f compose.prod.yaml logs server

      - name: Inspect server container
        run: docker inspect $(docker compose -f compose.prod.yaml ps -q server)

      - name: Check server process
        run: docker compose -f compose.prod.yaml exec -T server sh -c "ls -la"

      - name: Test API (host)
        run: |
          # From the runner, use localhost since service DNS (server) only resolves inside the compose network
          for i in {1..3}; do
            if curl --fail http://localhost:${{ env.SERVER_PORT || 4000 }}/api/health; then
              exit 0
            fi
            echo 'Waiting for server on localhost to become available...'
            sleep 5
          done
          exit 1

      - name: Show logs if failure
        if: failure()
        run: docker compose -f compose.prod.yaml logs

      - name: Cleanup
        run: docker compose -f compose.prod.yaml down -v