name: Test Production Compose (Docker Hub Images)

on:
  workflow_run:
    workflows: ["Kubernetes Production Validation"]
    types:
      - completed

  workflow_dispatch:

jobs:
  test-prod-compose:
    runs-on: ubuntu-latest

    env:
      COMPOSE_FILE: compose.prod.yaml
      SERVER_PORT: 4000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------
      # ENV SETUP
      # -----------------------------
      - name: Create production test .env
        run: |
          cat <<EOF > .env
          APP_NAME=PERNForge
          NGINX_PORT=80
          CLIENT_URL=http://client:4173
          CLIENT_PORT=4173
          SERVER_URL=http://server:4000
          SERVER_PORT=4000
          API_BASE_URL=/api
          DB_URL=postgresql://test:test@postgres:5432/testdb
          DB_NAME=testdb
          DB_USER=test
          DB_PASSWORD=test
          DB_PORT=5432
          REDIS_URL=redis://redis:6379
          REDIS_HOST=redis
          REDIS_PORT=6379
          REDIS_PASSWORD=pernforge
          JWT_SECRET=testsecret
          DOCKERHUB_USERNAME=${{ secrets.DOCKER_HUB_USERNAME }}
          EOF

      # -----------------------------
      # VALIDATE COMPOSE
      # -----------------------------
      - name: Validate Docker Compose
        run: docker compose -f $COMPOSE_FILE version

      # -----------------------------
      # BUILD + START STACK
      # -----------------------------
      - name: Build & start stack
        run: |
          docker compose -f $COMPOSE_FILE up -d --build --wait

      - name: Show service status
        run: docker compose -f $COMPOSE_FILE ps

      # -----------------------------
      # HEALTH CHECK (FIXED)
      # -----------------------------
      - name: Wait for server health
        run: |
          for i in {1..10}; do
            if curl -fs http://localhost:${SERVER_PORT}/api/health; then
              echo "Server is healthy"
              exit 0
            fi

            echo "Waiting for server..."
            sleep 3
          done

          echo "Server failed health check"
          docker compose -f $COMPOSE_FILE logs server
          exit 1

      # -----------------------------
      # DEBUG (ONLY ON FAILURE)
      # -----------------------------
      - name: Dump logs on failure
        if: failure()
        run: docker compose -f $COMPOSE_FILE logs --tail=200

      - name: Inspect server container
        if: failure()
        run: |
          docker inspect $(docker compose -f $COMPOSE_FILE ps -q server) || true

      # -----------------------------
      # CLEANUP
      # -----------------------------
      - name: Cleanup stack
        if: always()
        run: docker compose -f $COMPOSE_FILE down -v