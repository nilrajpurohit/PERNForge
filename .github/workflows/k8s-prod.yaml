name: Kubernetes Production Validation

on:
  workflow_run:
    workflows: ["Test Production Compose (Docker Hub Images)"]
    types:
      - completed

  workflow_dispatch:

jobs:
  kubernetes-validation:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    runs-on: ubuntu-latest

    env:
      NAMESPACE: pernforge-prod
      DOCKER_USER: ${{ secrets.DOCKER_HUB_USERNAME }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -----------------------------
      # Kubernetes + Cluster Setup
      # -----------------------------
      - name: Setup kubectl & Helm
        uses: azure/setup-kubectl@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Create Kind Cluster
        uses: helm/kind-action@v1

      - name: Cluster Info
        run: |
          kubectl cluster-info
          kubectl get nodes

      # -----------------------------
      # Ingress Controller (optimized)
      # -----------------------------
      - name: Install Ingress NGINX
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update

          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
            --namespace ingress-nginx \
            --create-namespace

      - name: Wait for Ingress Controller
        run: |
          kubectl rollout status deployment/ingress-nginx-controller \
            -n ingress-nginx \
            --timeout=180s

      # -----------------------------
      # Databases (combined Helm setup)
      # -----------------------------
      - name: Install PostgreSQL
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

          helm upgrade --install postgres bitnami/postgresql \
            --namespace $NAMESPACE \
            --create-namespace \
            --set auth.username=pernforge \
            --set auth.password=pernforgepassword \
            --set auth.database=pernforge

      - name: Install Redis
        run: |
          helm upgrade --install redis bitnami/redis \
            --namespace $NAMESPACE \
            --set auth.enabled=true \
            --set auth.password=pernforge

      # -----------------------------
      # Secrets (idempotent)
      # -----------------------------
      - name: Create Kubernetes Secrets
        run: |
          kubectl create secret generic pernforge-secret \
            --namespace $NAMESPACE \
            --from-literal=DATABASE_URL="postgresql://pernforge:pernforgepassword@postgres-postgresql:5432/pernforge" \
            --from-literal=REDIS_URL="redis://:pernforge@redis-master:6379" \
            --from-literal=JWT_SECRET="supersecret" \
            --dry-run=client -o yaml | kubectl apply -f -

      # -----------------------------
      # Deploy Application
      # -----------------------------
      - name: Update Image Tags (Kustomize)
        run: |
          cd infra/kubernetes/overlays/prod

          kustomize edit set image pernforge-server=$DOCKER_USER/pern-server:${{ github.sha }}
          kustomize edit set image pernforge-client=$DOCKER_USER/pern-client:${{ github.sha }}

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -k infra/kubernetes/overlays/prod

      # -----------------------------
      # Rollout checks (clean + parallel)
      # -----------------------------
      - name: Wait for Deployments
        run: |
          kubectl rollout status deployment/pernforge-client -n $NAMESPACE --timeout=180s &
          kubectl rollout status deployment/pernforge-server -n $NAMESPACE --timeout=180s &
          wait

      # -----------------------------
      # Health validation (no port-forward hacks)
      # -----------------------------
      - name: Port-forward server
        run: |
          kubectl port-forward svc/pernforge-server 4000:4000 -n $NAMESPACE > /dev/null 2>&1 &
          echo "PORT_FORWARD_PID=$!" >> $GITHUB_ENV

      - name: Wait for API health
        run: |
          for i in {1..10}; do
            if curl -fs http://localhost:4000/api/health; then
              echo "API is healthy"
              exit 0
            fi
            echo "Waiting for API..."
            sleep 3
          done

          echo "API failed health check"
          kubectl logs deployment/pernforge-server -n $NAMESPACE
          exit 1

      # -----------------------------
      # Debug only on failure
      # -----------------------------
      - name: Debug Kubernetes state
        if: failure()
        run: |
          kubectl get pods -A
          kubectl describe pods -n $NAMESPACE
          kubectl logs deployment/pernforge-server -n $NAMESPACE
          kubectl logs deployment/pernforge-client -n $NAMESPACE

      # -----------------------------
      # Cleanup
      # -----------------------------
      - name: Cleanup Kind Cluster
        if: always()
        run: kind delete cluster