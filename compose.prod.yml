services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      DB_PORT: ${DB_PORT}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - ${DB_PORT}:${DB_PORT}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pern-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: ${REDIS_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    ports:
      - ${REDIS_PORT}:${REDIS_PORT}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pern-network

  server:
    image: ${DOCKERHUB_USERNAME}/pern-server:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DB_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      SERVER_PORT: ${SERVER_PORT}
    ports:
      - ${SERVER_PORT}:${SERVER_PORT}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pern-network

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      SERVER_URL: ${SERVER_URL}
      CLIENT_URL: ${CLIENT_URL}
      NGINX_PORT: ${NGINX_PORT}
    ports:
      - ${NGINX_PORT}:${NGINX_PORT}
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      - server
    networks:
      - pern-network
  
  client:
    image: ${DOCKERHUB_USERNAME}/pern-client:latest
    restart: unless-stopped
    env_file: .env
    environment:
      API_BASE_URL: ${API_BASE_URL}
      CLIENT_PORT: ${CLIENT_PORT}
    ports:
      - ${CLIENT_PORT}:${CLIENT_PORT}
    depends_on:
      - nginx
      - server
    networks:
      - pern-network

volumes:
  postgres-data:
  redis-data:

networks:
  pern-network:
    driver: bridge