apiVersion: apps/v1
kind: Deployment
metadata:
  name: pernforge-server
spec:
  replicas: 2

  selector:
    matchLabels:
      app: pernforge-server

  template:
    metadata:
      labels:
        app: pernforge-server

    spec:
      serviceAccountName: pernforge-server-sa

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: pernforge-server

      containers:
        - name: server
          image: pernforg-server:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 4000

          envFrom:
            - configMapRef:
                name: pernforge-config

            - secretRef:
                name: pernforge-secret

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"

            limits:
              memory: "512Mi"
              cpu: "500m"
          
          startupProbe:
            httpGet:
              path: /api/health
              port: 4000
            failureThreshold: 30
            periodSeconds: 5

          readinessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3