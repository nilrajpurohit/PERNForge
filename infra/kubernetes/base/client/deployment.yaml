apiVersion: apps/v1
kind: Deployment
metadata:
  name: pernforge-client
spec:
  replicas: 2

  selector:
    matchLabels:
      app: pernforge-client

  template:
    metadata:
      labels:
        app: pernforge-client

    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - pernforge-client

      containers:
        - name: client
          image: pernforg-client:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 4173

          envFrom:
            - configMapRef:
                name: pernforge-config

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"

            limits:
              memory: "256Mi"
              cpu: "250m"

          readinessProbe:
            httpGet:
              path: /
              port: 4173
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /
              port: 4173
            initialDelaySeconds: 10
            periodSeconds: 10