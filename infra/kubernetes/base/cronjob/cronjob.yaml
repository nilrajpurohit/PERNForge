apiVersion: batch/v1
kind: CronJob

metadata:
  name: pernforge-cleanup

spec:
  schedule: "0 2 * * *"

  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: cleanup
              image: nilrajpurohit3/pern-server:latest
              imagePullPolicy: Always

              envFrom:
                - configMapRef:
                    name: pernforge-config

                - secretRef:
                    name: pernforge-secret
                    
              command:
                - node
                - dist/jobs/cleanup.js

              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi

                limits:
                  cpu: 250m
                  memory: 256Mi

          restartPolicy: OnFailure